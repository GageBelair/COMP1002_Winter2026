<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gage Belair — Contact</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/main.css" />
</head>

<body class="contact-page">

    <div class="container">

        <!-- Header -->
        <header>
            <h1>Gage Belair</h1>

            <button id="themeToggle">Toggle Theme</button>

            <p class="subtitle">Computer Programming College Student</p>

            <nav aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>

        <!-- Main Content -->
        <main>

            <section id="contact" aria-labelledby="contact-heading">

                <header>
                    <h2 id="contact-heading">Contact Me</h2>
                    <p>If you would like to reach out, please fill out the form below.</p>
                </header>

                <!-- Contact Card -->
                <section class="contact-wrapper">

                    <form action="#" method="post" class="contact-form">

                        <div>
                            <label for="name">Name</label>
                            <input type="text"
                                   id="name"
                                   name="name"
                                   required />
                        </div>

                        <div>
                            <label for="email">Email</label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   required />
                        </div>

                        <div>
                            <label for="message">Message</label>
                            <textarea id="message"
                                      name="message"
                                      rows="4"
                                      required></textarea>
                        </div>

                        <button type="submit">
                            Send Message
                        </button>

                    </form>

                </section>

            </section>

        </main>

        <!-- Footer -->
        <footer>
            <p>COMP1002 — Personal Portfolio</p>
        </footer>

    </div>
    <script src="scripts/script.js"></script>
</body>

</html>
