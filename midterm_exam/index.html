<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Midterm Login Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body class="login-page">
    <div class="container">
        <header>
            <nav aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html">Contact</a></li>
                    <li><a href="index.html">Info</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="login" aria-label="Login Page">
                <h2>Login Page</h2>

                <!-- Card Wrapper -->
                <div class="login-wrapper">
                    <form action="#" method="post" class="login-form">
                        <div>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required />
                        </div>

                        <div>
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required/>
                        </div>

                        <button type="submit">Login</button>
                    </form>
                </div>
            </section>
        </main>
        <footer>
            <p>COMP1002 — Login Page</p>
        </footer>
    </div>
</body>
</html>
